# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - "*.md"

  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - "*.md"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "alpine"
            python: "3.7"
          - platform: "alpine"
            python: "3.8"
          - platform: "alpine"
            python: "3.9"
          - platform: "alpine"
            python: "3.10"
          - platform: "alpine"
            python: "3.11"
          - platform: "alpine"
            python: "3.12"
          - platform: "alpine"
            python: "3.13"
          - platform: "alpine"
            python: "3.14"
          - platform: "ubuntu_24_04"
            python: "3"
          - platform: "altlinux_10"
            python: "3"
          - platform: "altlinux_11"
            python: "3"
          - platform: "astralinux_1_7"
            python: "3"

    env:
      BASE_SIGN: "${{ matrix.platform }}-py${{ matrix.python }}"

    steps:
    - name: Prepare variables
      run: |
        echo "RUN_CFG__NOW=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV
        echo "RUN_CFG__LOGS_DIR=logs-${{ env.BASE_SIGN }}" >> $GITHUB_ENV
        echo "RUN_CFG__DOCKER_IMAGE_NAME=tests-${{ env.BASE_SIGN }}" >> $GITHUB_ENV
        echo "RUN_CFG__REMOTE2_NAME=remote2-${{ env.BASE_SIGN }}" >> $GITHUB_ENV
        echo "RUN_CFG__SSH_KEY_NAME=id_ed25519-${{ env.BASE_SIGN }}" >> $GITHUB_ENV
        echo "---------- [$GITHUB_ENV]"
        cat $GITHUB_ENV
    - name: Checkout
      uses: actions/checkout@v7
    - name: Prepare logs folder on the host
      run: mkdir -p "${{ env.RUN_CFG__LOGS_DIR }}"
    - name: Adjust logs folder permission
      run: chmod -R 777 "${{ env.RUN_CFG__LOGS_DIR }}"
    - name: Build local image ${{ matrix.alpine }}
      run: docker build --build-arg PYTHON_VERSION="${{ matrix.python }}" -t "${{ env.RUN_CFG__DOCKER_IMAGE_NAME }}" -f Dockerfile--${{ matrix.platform }}.tmpl .

    - name: Generate temporary SSH Key pair for CI
      run: |
        # Generate a key without a password directly on the GitHub Actions host
        ssh-keygen -t ed25519 -N "" -f ${{ github.workspace }}/${{ env.RUN_CFG__SSH_KEY_NAME }}

    - name: Run second target host (remote2)
      run: |
        docker run -d -t --name ${{ env.RUN_CFG__REMOTE2_NAME }} \
          -v ${{ github.workspace }}/${{ env.RUN_CFG__SSH_KEY_NAME }}.pub:/home/test/.ssh/authorized_keys_ci:ro \
          "${{ env.RUN_CFG__DOCKER_IMAGE_NAME }}" \
          - sleep infinity

        sleep 1.0

        docker exec -u root ${{ env.RUN_CFG__REMOTE2_NAME }} sh -c "
          echo '--- INSIDE CONTAINER OS ---' && \
          cat /etc/os-release && \
          echo '---' && \
          cp /home/test/.ssh/authorized_keys_ci /home/test/.ssh/authorized_keys && \
          chown test.test /home/test/.ssh/authorized_keys && \
          chmod 600 /home/test/.ssh/authorized_keys && \
          chmod 700 /home/test/.ssh && \
          echo '--- INSIDE CONTAINER .SSH ---' && \
          ls -la /home/test/.ssh/
        "

    - name: Run Main Test Container
      run: |
        # Launch the main container, passing the private key to the .ssh folder of the test user.
        # Pass environment variables so Python tests know where to start.
        # Link the containers using --link so the name "remote2" resolves to an IP address.
        docker run -t \
          --link ${{ env.RUN_CFG__REMOTE2_NAME }}:${{ env.RUN_CFG__REMOTE2_NAME }} \
          -v ${{ github.workspace }}/${{ env.RUN_CFG__LOGS_DIR }}:/home/test/testgres/logs \
          -v ${{ github.workspace }}/${{ env.RUN_CFG__SSH_KEY_NAME }}:/home/test/testgres/id_ed25519_test:ro \
          -e TEST_PARAM_REMOTE2_HOST="${{ env.RUN_CFG__REMOTE2_NAME }}" \
          -e TEST_PARAM_REMOTE2_USERNAME="test" \
          -e TEST_PARAM_REMOTE2_SSH_KEY="/home/test/testgres/id_ed25519_test" \
          "${{ env.RUN_CFG__DOCKER_IMAGE_NAME }}"

    - name: Upload Logs
      uses: actions/upload-artifact@v7
      if: always() # IT IS IMPORTANT!
      with:
        name: testgres.os_ops--test_logs--${{ env.RUN_CFG__NOW }}-${{ env.BASE_SIGN }}-id${{ github.run_id }}
        path: "${{ env.RUN_CFG__LOGS_DIR }}/"
