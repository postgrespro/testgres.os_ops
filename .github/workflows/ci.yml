# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    branches: [ "master" ]
    paths-ignore:
      - "*.md"

  pull_request:
    branches: [ "master" ]
    paths-ignore:
      - "*.md"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "alpine"
            python: "3.12"

    env:
      BASE_SIGN: "${{ matrix.platform }}-py${{ matrix.python }}"

    steps:
    - name: Prepare variables
      run: |
        echo "RUN_CFG__NOW=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_ENV
        echo "RUN_CFG__LOGS_DIR=logs-${{ env.BASE_SIGN }}" >> $GITHUB_ENV
        echo "RUN_CFG__DOCKER_IMAGE_NAME=tests-${{ env.BASE_SIGN }}" >> $GITHUB_ENV
        echo "---------- [$GITHUB_ENV]"
        cat $GITHUB_ENV
    - name: Checkout
      uses: actions/checkout@v7
    - name: Prepare logs folder on the host
      run: mkdir -p "${{ env.RUN_CFG__LOGS_DIR }}"
    - name: Adjust logs folder permission
      run: chmod -R 777 "${{ env.RUN_CFG__LOGS_DIR }}"
    - name: Build local image ${{ matrix.alpine }}
      run: docker build --build-arg PYTHON_VERSION="${{ matrix.python }}" -t "${{ env.RUN_CFG__DOCKER_IMAGE_NAME }}" -f Dockerfile--${{ matrix.platform }}.tmpl .

    - name: Generate temporary SSH Key pair for CI
      run: |
        # Generate a key without a password directly on the GitHub Actions host
        ssh-keygen -t ed25519 -N "" -f ${{ github.workspace }}/id_ed25519
        # Create a folder structure for forwarding the key to the test user
        mkdir -p ${{ github.workspace }}/remote2_ssh
        cat ${{ github.workspace }}/id_ed25519.pub > ${{ github.workspace }}/remote2_ssh/authorized_keys
        chmod 600 ${{ github.workspace }}/remote2_ssh/authorized_keys

    - name: Run second target host (remote2)
      run: |
        # Launch a second container in the background (-d) named "remote2"
        # Add the generated key to its authorized_keys for the user "test"
        # Redefine CMD to "sleep infinity" so it runs as a bare server
        docker run -d --name remote2 \
          -v ${{ github.workspace }}/remote2_ssh/authorized_keys:/home/test/.ssh/authorized_keys_ci:ro \
          "${{ env.RUN_CFG__DOCKER_IMAGE_NAME }}" \
          - bash -c '\
          echo "---------------- OS" && \
          cat /etc/os-release
          echo "---------------- USERS" && \
          getent passwd && \
          echo "---------------- DIRS" && \
          echo "HOME DIR IS [`realpath ~/`]" &&  \
          echo "WORK DIR IS [$(pwd)]" && \
          echo "---------------- WORK DIR" && \
          ls -la ./ && \
          echo "---------------- .SSH" && \
          ls -la /home/test/.ssh/ && \
          cp /home/test/.ssh/authorized_keys_ci /home/test/.ssh/authorized_keys && \
          ls -la /home/test/.ssh/ && \
          chown test:test /home/test/.ssh/authorized_keys && \
          chmod 600 /home/test/.ssh/authorized_keys && \
          chmod 700 /home/test/.ssh && \
          ls -la /home/test/.ssh/ && \
          sleep infinity \
          '

    - name: Run Main Test Container
      run: |
        # Launch the main container, passing the private key to the .ssh folder of the test user.
        # Pass environment variables so Python tests know where to start.
        # Link the containers using --link so the name "remote2" resolves to an IP address.
        docker run -t \
          --link remote2:remote2 \
          -v ${{ github.workspace }}/${{ env.RUN_CFG__LOGS_DIR }}:/home/test/testgres/logs \
          -v ${{ github.workspace }}/id_ed25519:/home/test/.ssh/id_ed25519:ro \
          -e TEST_PARAM_REMOTE2_HOST="remote2" \
          -e TEST_PARAM_REMOTE2_USERNAME="test" \
          -e TEST_PARAM_REMOTE2_SSH_KEY="/home/test/.ssh/id_ed25519" \
          "${{ env.RUN_CFG__DOCKER_IMAGE_NAME }}"

    - name: Upload Logs
      uses: actions/upload-artifact@v7
      if: always() # IT IS IMPORTANT!
      with:
        name: testgres.os_ops--test_logs--${{ env.RUN_CFG__NOW }}-${{ env.BASE_SIGN }}-id${{ github.run_id }}
        path: "${{ env.RUN_CFG__LOGS_DIR }}/"
